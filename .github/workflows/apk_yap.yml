name: Android APK Yap

on:
  workflow_dispatch: # Butona basarak çalıştır

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Flutter Kurulumu
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Kütüphaneleri Yükle
        run: |
          pip install -r requirements.txt
          pip install flet

      - name: APK Üretiliyor (Biraz sürer)
        run: |
          flet build apk --verbose

      - name: APK Dosyasını Yükle
        uses: actions/upload-artifact@v4
        with:
          name: DenetimAsistani
          path: build/apk/**/*.apk
